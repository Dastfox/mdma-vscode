name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx --yes @vscode/vsce package
      - name: Publish to VS Code Marketplace
        # continue-on-error: a re-run of an already-published version (or any
        # other one-off failure here) shouldn't stop the Open VSX publish below.
        continue-on-error: true
        run: npx --yes @vscode/vsce publish --packagePath *.vsix --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        # Requires a Personal Access Token from https://dev.azure.com (per VS
        # Code publishing docs) stored as the VSCE_PAT repo secret:
        #   gh secret set VSCE_PAT --repo Dastfox/mdma-vscode
      - name: Publish to Open VSX
        continue-on-error: true
        run: npx --yes ovsx publish *.vsix --pat "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        # Cursor uses the Open VSX registry. Requires a token from
        # https://open-vsx.org stored as the OVSX_PAT repo secret:
        #   gh secret set OVSX_PAT --repo Dastfox/mdma-vscode
